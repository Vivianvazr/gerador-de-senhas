name: Pipeline CI

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  PROJECT_NAME: gerador-de-senhas

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install
        run: npm install

      - name: Test
        run: npm test

      - name: Build
        run: npm run build