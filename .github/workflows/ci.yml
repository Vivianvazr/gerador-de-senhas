name: Pipeline CI

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  PROJECT_NAME: gerador-de-senhas

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Mostrar variável
        run: echo "Projeto: $PROJECT_NAME"

      - name: Instalar dependências
        run: npm install

      - name: Executar testes
        run: npm test

      - name: Executar build
        run: npm run build